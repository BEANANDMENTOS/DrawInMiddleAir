<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b0d12" />
<title>DrawInMiddleAir — จีบยังไงก็ไม่ได้เธอกลับมา</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: rgba(20, 24, 33, 0.72);
    --accent: #4f8cff;
    --text: #f5f7fa;
    --muted: #9aa3b2;
    --danger: #ff5d5d;
    --good: #34c759;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  header {
    flex: 0 0 auto;
    padding: 12px 18px;
    padding-top: max(12px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 16px;
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }

  /* ---- Stage ---- */
  #stage {
    flex: 1 1 auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }
  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    z-index: 0;
  }
  #display {
    position: relative;
    z-index: 1;
    max-width: 100%;
    max-height: 100%;
    display: block;
  }

  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 5; }
  #flash.fire { animation: flash .35s ease-out; }
  @keyframes flash { 0% { opacity: .9; } 100% { opacity: 0; } }

  #status {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 4; padding: 8px 16px; border-radius: 999px;
    background: var(--panel); backdrop-filter: blur(8px);
    font-size: 14px; font-weight: 600; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
    transition: background .2s;
  }
  #status.drawing { background: rgba(52,199,89,.85); }

  #camName {
    position: absolute; top: 12px; left: 12px; z-index: 4;
    max-width: 50%; padding: 6px 12px; border-radius: 999px;
    background: var(--panel); backdrop-filter: blur(8px);
    font-size: 12.5px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: none; align-items: center;
  }

  #toolbar {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 4; display: flex; align-items: center; gap: 10px;
    max-width: calc(100% - 24px); overflow-x: auto; scrollbar-width: none;
    padding: 8px 12px; border-radius: 999px;
    background: var(--panel); backdrop-filter: blur(8px);
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .swatch {
    flex: 0 0 30px; width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent; transition: transform .08s;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .swatch:active { transform: scale(.9); }
  .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(0,0,0,.4); }
  .size-control {
    flex: 0 0 128px; height: 30px; padding: 0 10px; border-radius: 999px;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.12);
  }
  .size-dot {
    flex: 0 0 18px; width: 10px; height: 10px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.35);
  }
  #sizeRange {
    width: 82px; accent-color: var(--accent);
  }
  #clearBtn, #voiceBtn { background: rgba(255,255,255,.12); color: var(--text); }
  #voiceBtn.listening { background: var(--good); box-shadow: 0 0 0 3px rgba(52,199,89,.25); }
  #voiceBtn.unsupported { opacity: .4; cursor: not-allowed; }

  #overlay {
    position: absolute; inset: 0; z-index: 6;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; text-align: center; padding: 24px;
    background: rgba(5, 7, 11, .9);
  }
  #overlay.hidden { display: none; }
  .spinner { width: 42px; height: 42px; border-radius: 50%; border: 3px solid rgba(255,255,255,.18); border-top-color: var(--accent); animation: spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlayMsg { color: var(--muted); max-width: 460px; line-height: 1.6; font-size: 15px; }
  #overlayMsg.error { color: var(--danger); }

  #preview { position: absolute; inset: 0; z-index: 7; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; }
  #preview.show { display: flex; }
  #photo { max-width: 100%; max-height: 100%; object-fit: contain; }

  button { font-family: inherit; cursor: pointer; border: none; color: var(--text); transition: transform .08s ease, background .15s ease, opacity .15s ease; }
  button:active { transform: scale(.94); }

  .controls {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; padding-bottom: max(16px, env(safe-area-inset-bottom)); gap: 16px;
  }
  .icon-btn {
    width: 54px; height: 54px; border-radius: 50%; background: var(--panel); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; font-size: 23px;
  }
  .icon-btn:disabled { opacity: .35; cursor: default; }
  .icon-btn.on { background: var(--accent); }

  #shutter { width: 74px; height: 74px; border-radius: 50%; background: #fff; padding: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 4px rgba(0,0,0,.35), 0 0 0 7px #fff; }
  #shutter::after { content: ""; width: 58px; height: 58px; border-radius: 50%; background: #fff; border: 2px solid #0b0d12; }
  #shutter:disabled { opacity: .4; cursor: default; }

  .preview-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; padding: 18px; padding-bottom: max(18px, env(safe-area-inset-bottom)); }
  .pill { padding: 14px 22px; border-radius: 999px; font-size: 16px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
  .pill.primary { background: var(--accent); }
  .pill.secondary { background: var(--panel); }
  .pill.ghost { background: transparent; border: 1.5px solid rgba(255,255,255,.25); }
  .retry-btn { background: var(--accent); padding: 12px 24px; border-radius: 999px; font-size: 16px; font-weight: 600; }
  .hint { font-size: 12.5px; color: var(--muted); text-align: center; padding: 0 18px 10px; }

  @media (max-width: 360px) {
    #toolbar { gap: 8px; padding: 7px 10px; }
    .swatch { flex-basis: 28px; width: 28px; height: 28px; font-size: 14px; }
    .size-control { flex-basis: 112px; height: 28px; }
    #sizeRange { width: 68px; }
  }
</style>
</head>
<body>
  <header><span class="dot"></span> DrawInMiddleAir — จีบยังไงก็ไม่ได้เธอกลับมา ✍️</header>

  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="display"></canvas>
    <div id="flash"></div>

    <div id="camName"></div>
    <div id="status">⏳ กำลังเริ่มต้น…</div>

    <div id="toolbar">
      <div class="swatch active" data-color="#ffffff" style="background:#ffffff"></div>
      <div class="swatch" data-color="#ff3b30" style="background:#ff3b30"></div>
      <div class="swatch" data-color="#ffd60a" style="background:#ffd60a"></div>
      <div class="swatch" data-color="#34c759" style="background:#34c759"></div>
      <div class="swatch" data-color="#0a84ff" style="background:#0a84ff"></div>
      <div class="swatch" data-color="eraser" title="ยางลบ">🧽</div>
      <label class="size-control" title="ปรับขนาดเส้น">
        <span class="size-dot" id="sizeDot"></span>
        <input id="sizeRange" type="range" min="4" max="44" value="12" step="1" aria-label="ปรับขนาดเส้น" />
      </label>
      <button class="swatch" id="undoBtn" title="ย้อนกลับ" aria-label="ย้อนกลับ">↩️</button>
      <button class="swatch" id="clearBtn" title="ล้างทั้งหมด">🗑️</button>
      <button class="swatch" id="voiceBtn" title="ฟังคำสั่งสี" aria-label="ฟังคำสั่งสี">🎙️</button>
    </div>

    <div id="overlay">
      <div class="spinner" id="spinner"></div>
      <div id="overlayMsg">กำลังเปิดกล้อง…</div>
      <button class="retry-btn" id="retryBtn" style="display:none">เปิดกล้อง</button>
    </div>

    <div id="preview"><img id="photo" alt="ผลงาน" /></div>
  </div>

  <div class="controls" id="liveControls">
    <button class="icon-btn" id="switchBtn" title="สลับกล้อง" aria-label="สลับกล้อง">🔄</button>
    <button id="shutter" title="ถ่ายเก็บผลงาน (Space)" aria-label="ถ่ายรูป"></button>
    <button class="icon-btn" id="mirrorBtn" title="กลับซ้าย-ขวา" aria-label="มิเรอร์">🪞</button>
  </div>

  <div class="preview-actions" id="previewControls" style="display:none">
    <button class="pill ghost" id="retakeBtn">↩︎ วาดต่อ</button>
    <button class="pill secondary" id="downloadBtn">⬇︎ ดาวน์โหลด</button>
    <button class="pill primary" id="shareBtn" style="display:none">📤 บันทึก / แชร์</button>
  </div>
  <div class="hint" id="iosHint" style="display:none">iPhone/iPad: กด “บันทึก / แชร์” แล้วเลือก “บันทึกรูปภาพ” เพื่อเก็บลงคลังภาพ</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10/vision_bundle.mjs";

const video   = document.getElementById("video");
const display = document.getElementById("display");
const dctx    = display.getContext("2d");
const flash   = document.getElementById("flash");
const statusEl= document.getElementById("status");
const camNameEl = document.getElementById("camName");
const overlay = document.getElementById("overlay");
const spinner = document.getElementById("spinner");
const overlayMsg = document.getElementById("overlayMsg");
const retryBtn   = document.getElementById("retryBtn");
const liveControls = document.getElementById("liveControls");
const switchBtn  = document.getElementById("switchBtn");
const mirrorBtn  = document.getElementById("mirrorBtn");
const shutter    = document.getElementById("shutter");
const toolbar    = document.getElementById("toolbar");
const sizeRange  = document.getElementById("sizeRange");
const sizeDot    = document.getElementById("sizeDot");
const undoBtn    = document.getElementById("undoBtn");
const clearBtn   = document.getElementById("clearBtn");
const voiceBtn   = document.getElementById("voiceBtn");
const preview    = document.getElementById("preview");
const photo      = document.getElementById("photo");
const previewControls = document.getElementById("previewControls");
const retakeBtn  = document.getElementById("retakeBtn");
const downloadBtn= document.getElementById("downloadBtn");
const shareBtn   = document.getElementById("shareBtn");
const iosHint    = document.getElementById("iosHint");

const strokeCanvas = document.createElement("canvas");
const sctx = strokeCanvas.getContext("2d");

let stream = null;
let facingMode = "environment";
let videoDevices = [];
let currentDeviceId = null;
let triedCamo = false;            // auto-pick Camo only once at startup
let mirrorOn = false;             // is the displayed image flipped L-R?
let userMirrorOverride = null;    // null = auto (mirror only the front cam)

let handLandmarker = null;
let modelReady = false;
let running = false;
let lastVideoTime = -1;

let W = 0, H = 0;
let color = "#ffffff";
let brushSize = Number(sizeRange.value);
let isEraser = false;
let isPinching = false;
let lastDraw = null;
let curLandmarks = null;
let pinchPt = null;
let undoStack = [];

let currentBlob = null, currentUrl = null, currentName = "";
let statusHoldUntil = 0;
let voiceRecognition = null;
let voiceListening = false;
let voiceActive = false;

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
const CAMO_RE = /camo|reincubate/i;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const VOICE_COLORS = [
  { value: "#ffffff", label: "สีขาว", words: ["ขาว", "สีขาว", "white"] },
  { value: "#ff3b30", label: "สีแดง", words: ["แดง", "สีแดง", "red"] },
  { value: "#ffd60a", label: "สีเหลือง", words: ["เหลือง", "สีเหลือง", "yellow"] },
  { value: "#34c759", label: "สีเขียว", words: ["เขียว", "สีเขียว", "green"] },
  { value: "#0a84ff", label: "สีฟ้า", words: ["ฟ้า", "สีฟ้า", "น้ำเงิน", "สีน้ำเงิน", "blue"] }
];

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [9,10],[10,11],[11,12],
  [13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function tsName() {
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return `draw-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.jpg`;
}
function showOverlay(msg, { error = false, retry = false } = {}) {
  overlay.classList.remove("hidden");
  spinner.style.display = error ? "none" : "block";
  overlayMsg.textContent = msg;
  overlayMsg.classList.toggle("error", error);
  retryBtn.style.display = retry ? "inline-block" : "none";
}
function hideOverlay() { overlay.classList.add("hidden"); }
function setStatus(text, drawing = false, { force = false } = {}) {
  if (!force && performance.now() < statusHoldUntil) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("drawing", drawing);
}
function flashStatus(text, drawing = false) {
  statusHoldUntil = performance.now() + 1700;
  setStatus(text, drawing, { force: true });
}
function setCamName(name) {
  if (!name) { camNameEl.style.display = "none"; return; }
  camNameEl.textContent = (CAMO_RE.test(name) ? "🟢 " : "📷 ") + name;
  camNameEl.style.display = "flex";
}
function clearDrawing() {
  pushUndoState();
  if (W) sctx.clearRect(0, 0, W, H);
  lastDraw = null;
}
function pushUndoState() {
  if (!W || !H) return;
  undoStack.push(sctx.getImageData(0, 0, W, H));
  if (undoStack.length > 16) undoStack.shift();
}
function undoDrawing() {
  const previous = undoStack.pop();
  if (!previous) {
    flashStatus("↩️ ไม่มีอะไรให้ย้อนกลับ");
    return;
  }
  sctx.putImageData(previous, 0, 0);
  lastDraw = null;
  flashStatus("↩️ ย้อนกลับแล้ว");
}
function selectTool(value) {
  toolbar.querySelectorAll(".swatch[data-color]").forEach(s => s.classList.remove("active"));
  const swatch = Array.from(toolbar.querySelectorAll(".swatch[data-color]"))
    .find(s => s.getAttribute("data-color") === value);
  if (swatch) swatch.classList.add("active");
  isEraser = value === "eraser";
  if (!isEraser) color = value;
  updateSizePreview();
}
function lineWidthForBrush() {
  return Math.max(2, brushSize * ((W || 1280) / 1280));
}
function lineWidthForEraser() {
  return Math.max(12, lineWidthForBrush() * 3);
}
function setBrushSize(value, { announce = false } = {}) {
  const next = Math.max(4, Math.min(44, Math.round(Number(value) || brushSize)));
  brushSize = next;
  sizeRange.value = String(next);
  updateSizePreview();
  if (announce) flashStatus(`🖌️ ขนาดเส้น ${next}`);
}
function updateSizePreview() {
  const dotSize = Math.max(7, Math.min(22, brushSize * 0.5));
  sizeDot.style.width = `${dotSize}px`;
  sizeDot.style.height = `${dotSize}px`;
  sizeDot.style.background = isEraser ? "rgba(255,255,255,.55)" : color;
}
function normalizeSpeech(text) {
  return text.toLowerCase().replace(/\s+/g, "");
}
function handleVoiceCommand(rawText) {
  const text = normalizeSpeech(rawText);
  if (!text) return;

  if (["ย้อนกลับ", "เลิกทำ", "คืนค่า", "undo", "goback", "back"].some(word => text.includes(word))) {
    undoDrawing();
    return;
  }
  if (["ล้าง", "เคลียร์", "ลบทั้งหมด", "clear", "clearall", "deleteall"].some(word => text.includes(word))) {
    clearDrawing();
    flashStatus("🗑️ ล้างทั้งหมดแล้ว");
    return;
  }
  if (["ยางลบ", "ลบ", "eraser", "erase"].some(word => text.includes(word))) {
    selectTool("eraser");
    flashStatus("🧽 เปลี่ยนเป็นยางลบ");
    return;
  }
  if (["ปากกา", "วาด", "pen", "draw"].some(word => text.includes(word))) {
    selectTool(color);
    flashStatus("✏️ กลับเป็นปากกา");
    return;
  }
  if (["เส้นใหญ่", "ใหญ่ขึ้น", "หนาขึ้น", "bigger", "larger", "thicker"].some(word => text.includes(word))) {
    setBrushSize(brushSize + 6, { announce: true });
    return;
  }
  if (["เส้นเล็ก", "เล็กลง", "บางลง", "smaller", "thinner"].some(word => text.includes(word))) {
    setBrushSize(brushSize - 6, { announce: true });
    return;
  }
  const spokenSize = text.match(/(?:ขนาด|size)(\d{1,2})/) || text.match(/(?:เส้น|line)(\d{1,2})/);
  if (spokenSize) {
    setBrushSize(spokenSize[1], { announce: true });
    return;
  }

  const picked = VOICE_COLORS.find(item => item.words.some(word => text.includes(word)));
  if (picked) {
    selectTool(picked.value);
    flashStatus(`🎨 เปลี่ยนเป็น${picked.label}`);
    return;
  }

  flashStatus(`🎙️ ได้ยิน: ${rawText}`);
}
function setupVoiceRecognition() {
  if (!SpeechRecognition) {
    voiceBtn.classList.add("unsupported");
    voiceBtn.title = "เบราว์เซอร์นี้ยังไม่รองรับคำสั่งเสียง";
    voiceBtn.disabled = true;
    return;
  }
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = "th-TH";
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = false;
  voiceRecognition.maxAlternatives = 3;
  voiceRecognition.onstart = () => {
    voiceActive = true;
    voiceBtn.classList.add("listening");
    flashStatus("🎙️ กำลังฟังคำสั่งสี");
  };
  voiceRecognition.onresult = (event) => {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) handleVoiceCommand(event.results[i][0].transcript);
    }
  };
  voiceRecognition.onerror = (event) => {
    const permissionErrors = ["not-allowed", "service-not-allowed"];
    if (permissionErrors.includes(event.error)) {
      voiceListening = false;
      flashStatus("🎙️ ยังไม่ได้อนุญาตไมค์");
    } else if (event.error !== "no-speech") {
      flashStatus("🎙️ ฟังเสียงไม่สำเร็จ");
    }
  };
  voiceRecognition.onend = () => {
    voiceActive = false;
    voiceBtn.classList.toggle("listening", voiceListening);
    if (voiceListening && !preview.classList.contains("show")) {
      setTimeout(() => {
        if (voiceListening && !voiceActive) {
          try { voiceRecognition.start(); } catch {}
        }
      }, 300);
    }
  };
}
function toggleVoice() {
  if (!voiceRecognition) {
    flashStatus("🎙️ เบราว์เซอร์นี้ยังไม่รองรับ");
    return;
  }
  voiceListening = !voiceListening;
  voiceBtn.classList.toggle("listening", voiceListening);
  if (voiceListening) {
    try { if (!voiceActive) voiceRecognition.start(); }
    catch { flashStatus("🎙️ เปิดไมค์ไม่ได้"); }
  } else {
    flashStatus("🎙️ หยุดฟังแล้ว");
    try { if (voiceActive) voiceRecognition.stop(); }
    catch {}
  }
}

// ---- hand-detection model ----
async function loadModel() {
  setStatus("⏳ กำลังโหลดโมเดลตรวจจับมือ…");
  try {
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(fileset, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
    modelReady = true;
    setStatus("✋ ยกมือขึ้นมาในกล้อง");
  } catch (err) {
    setStatus("⚠️ โหลดโมเดลไม่สำเร็จ (ตรวจเน็ต)");
    console.error("model load failed:", err);
  }
}

// ---- camera ----
function stopStream() { if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; } }

async function startCamera(deviceId) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
    return showOverlay("เบราว์เซอร์นี้ไม่รองรับการเข้าถึงกล้อง", { error: true });
  if (!window.isSecureContext)
    return showOverlay("กล้องทำงานเฉพาะบน HTTPS หรือ localhost เท่านั้น — เปิดผ่าน GitHub Pages (https://) หรือ http://localhost", { error: true, retry: true });

  showOverlay("กำลังเปิดกล้อง…");
  stopStream();
  try {
    const videoConstraints = deviceId
      ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }
      : { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } };
    stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: false });
    video.srcObject = stream;
    await video.play().catch(() => {});
    await new Promise(res => {
      if (video.readyState >= 2) return res();
      video.onloadedmetadata = () => res();
    });

    const track = stream.getVideoTracks()[0];
    const s = (track && track.getSettings) ? track.getSettings() : {};
    currentDeviceId = s.deviceId || deviceId || null;
    // auto-mirror only the user-facing (selfie) camera; Camo & rear cams: no mirror
    const autoMirror = s.facingMode === "user";
    mirrorOn = (userMirrorOverride === null) ? autoMirror : userMirrorOverride;

    setupCanvases();
    hideOverlay();
    shutter.disabled = false;
    await populateDevices();
    setCamName(track ? track.label : "");

    // first launch: if a Camo virtual camera exists, jump to it automatically
    if (!deviceId && !triedCamo) {
      triedCamo = true;
      const camo = videoDevices.find(d => CAMO_RE.test(d.label));
      if (camo && camo.deviceId && camo.deviceId !== currentDeviceId) return startCamera(camo.deviceId);
    }

    if (!running) { running = true; requestAnimationFrame(loop); }
  } catch (err) {
    handleCameraError(err, deviceId);
  }
}
function handleCameraError(err, deviceId) {
  const n = err && err.name;
  let msg;
  if (n === "NotAllowedError" || n === "SecurityError") msg = "ยังไม่ได้อนุญาตให้ใช้กล้อง — กดอนุญาตแล้วลองอีกครั้ง";
  else if (n === "NotFoundError" || n === "DevicesNotFoundError") msg = "ไม่พบกล้องบนอุปกรณ์นี้";
  else if (n === "NotReadableError" || n === "TrackStartError") msg = deviceId
      ? "เปิดกล้องตัวนี้ไม่ได้ (Camo เชื่อมต่ออยู่ไหม?) — กดเพื่อใช้กล้องปกติ"
      : "กล้องถูกแอปอื่นใช้งานอยู่ — ปิดแล้วลองใหม่";
  else msg = "เปิดกล้องไม่สำเร็จ: " + (err && err.message ? err.message : err);
  showOverlay(msg, { error: true, retry: true });
}
async function populateDevices() {
  try {
    videoDevices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === "videoinput");
    switchBtn.style.display = videoDevices.length > 1 ? "flex" : "none";
  } catch { videoDevices = []; }
}
function setupCanvases() {
  W = video.videoWidth; H = video.videoHeight;
  display.width = W; display.height = H;
  strokeCanvas.width = W; strokeCanvas.height = H;
  sctx.clearRect(0, 0, W, H);   // changing camera resets the drawing
  undoStack = [];
  lastDraw = null;
}

const mirror = () => mirrorOn;
function toDisp(p) { return { x: (mirror() ? (1 - p.x) : p.x) * W, y: p.y * H }; }
function dist2(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ---- main loop ----
function loop() {
  if (!running) return;
  if (modelReady && handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const res = handLandmarker.detectForVideo(video, performance.now());
    process(res);
  }
  composite();
  requestAnimationFrame(loop);
}

function process(res) {
  const hands = res && res.landmarks;
  if (!hands || hands.length === 0) {
    curLandmarks = null; pinchPt = null; isPinching = false; lastDraw = null;
    if (modelReady) setStatus("✋ ยกมือขึ้นมาในกล้อง");
    return;
  }
  const lm = hands[0];
  curLandmarks = lm;

  const pinchDist = dist2(lm[4], lm[8]);          // thumb tip ↔ index tip
  const palm = dist2(lm[0], lm[9]) || 1;          // palm-length reference
  const ratio = pinchDist / palm;
  if (!isPinching && ratio < 0.35) {
    pushUndoState();
    isPinching = true;
  }
  else if (isPinching && ratio > 0.50) isPinching = false;

  const mid = { x: (lm[4].x + lm[8].x) / 2, y: (lm[4].y + lm[8].y) / 2 };
  pinchPt = toDisp(mid);

  if (isPinching) {
    setStatus(isEraser ? "🧽 กำลังลบ" : "✏️ กำลังวาด", true);
    if (lastDraw) drawSegment(lastDraw, pinchPt);
    lastDraw = pinchPt;
  } else {
    setStatus("👌 จีบนิ้วโป้ง+ชี้ เพื่อวาด");
    lastDraw = null;
  }
}

function drawSegment(a, b) {
  sctx.lineCap = "round"; sctx.lineJoin = "round";
  if (isEraser) {
    sctx.globalCompositeOperation = "destination-out";
    sctx.lineWidth = lineWidthForEraser();
    sctx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    sctx.globalCompositeOperation = "source-over";
    sctx.lineWidth = lineWidthForBrush();
    sctx.strokeStyle = color;
  }
  sctx.beginPath(); sctx.moveTo(a.x, a.y); sctx.lineTo(b.x, b.y); sctx.stroke();
}

function composite() {
  if (!W) return;
  dctx.save();
  if (mirror()) { dctx.translate(W, 0); dctx.scale(-1, 1); }
  dctx.drawImage(video, 0, 0, W, H);
  dctx.restore();
  dctx.drawImage(strokeCanvas, 0, 0);
  if (curLandmarks) {
    dctx.strokeStyle = "rgba(255,255,255,.55)";
    dctx.lineWidth = Math.max(2, W * 0.004);
    for (const [a, b] of CONNECTIONS) {
      const pa = toDisp(curLandmarks[a]), pb = toDisp(curLandmarks[b]);
      dctx.beginPath(); dctx.moveTo(pa.x, pa.y); dctx.lineTo(pb.x, pb.y); dctx.stroke();
    }
    dctx.fillStyle = "rgba(79,140,255,.9)";
    for (const p of curLandmarks) {
      const d = toDisp(p);
      dctx.beginPath(); dctx.arc(d.x, d.y, Math.max(2, W * 0.005), 0, 7); dctx.fill();
    }
    if (pinchPt) {
      const r = Math.max(8, W * 0.018);
      dctx.beginPath(); dctx.arc(pinchPt.x, pinchPt.y, r, 0, 7);
      dctx.fillStyle = isPinching ? (isEraser ? "rgba(255,255,255,.5)" : color) : "rgba(255,255,255,.25)";
      dctx.fill();
      dctx.lineWidth = Math.max(2, W * 0.004); dctx.strokeStyle = "#fff"; dctx.stroke();
    }
  }
}

// ---- capture (video + drawing, no skeleton) ----
function capture() {
  if (!W) return;
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const ctx = c.getContext("2d");
  ctx.save();
  if (mirror()) { ctx.translate(W, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, 0, 0, W, H);
  ctx.restore();
  ctx.drawImage(strokeCanvas, 0, 0);

  flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");

  c.toBlob((blob) => {
    if (!blob) return;
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    currentBlob = blob; currentName = tsName(); currentUrl = URL.createObjectURL(blob);
    photo.src = currentUrl;
    let canShareFile = false;
    try { canShareFile = !!(navigator.canShare && navigator.canShare({ files: [new File([blob], currentName, { type: "image/jpeg" })] })); } catch {}
    shareBtn.style.display = canShareFile ? "inline-flex" : "none";
    iosHint.style.display = (isIOS && canShareFile) ? "block" : "none";
    running = false;
    preview.classList.add("show");
    liveControls.style.display = "none";
    previewControls.style.display = "flex";
  }, "image/jpeg", 0.95);
}
function retake() {
  preview.classList.remove("show");
  previewControls.style.display = "none";
  iosHint.style.display = "none";
  liveControls.style.display = "flex";
  if (!running) { running = true; lastVideoTime = -1; requestAnimationFrame(loop); }
}
function download() {
  if (!currentUrl) return;
  const a = document.createElement("a");
  a.href = currentUrl; a.download = currentName;
  document.body.appendChild(a); a.click(); a.remove();
}
async function share() {
  if (!currentBlob) return;
  try { await navigator.share({ files: [new File([currentBlob], currentName, { type: "image/jpeg" })], title: "DrawInMiddleAir" }); }
  catch {}
}

// ---- events ----
shutter.addEventListener("click", capture);
retakeBtn.addEventListener("click", retake);
downloadBtn.addEventListener("click", download);
shareBtn.addEventListener("click", share);
retryBtn.addEventListener("click", () => startCamera());
undoBtn.addEventListener("click", undoDrawing);
clearBtn.addEventListener("click", clearDrawing);
voiceBtn.addEventListener("click", toggleVoice);
sizeRange.addEventListener("input", () => setBrushSize(sizeRange.value));
sizeRange.addEventListener("change", () => setBrushSize(sizeRange.value, { announce: true }));

switchBtn.addEventListener("click", () => {
  userMirrorOverride = null;            // back to auto when changing device
  if (videoDevices.length > 1 && currentDeviceId) {
    const i = videoDevices.findIndex(d => d.deviceId === currentDeviceId);
    const next = videoDevices[(i + 1) % videoDevices.length];
    startCamera(next.deviceId);
  } else {
    facingMode = (facingMode === "environment") ? "user" : "environment";
    startCamera();
  }
});
mirrorBtn.addEventListener("click", () => {
  mirrorOn = !mirrorOn;
  userMirrorOverride = mirrorOn;
  mirrorBtn.classList.toggle("on", mirrorOn);
});

toolbar.querySelectorAll(".swatch[data-color]").forEach(sw => {
  sw.addEventListener("click", () => {
    selectTool(sw.getAttribute("data-color"));
  });
});
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !preview.classList.contains("show")) { e.preventDefault(); capture(); }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z") { e.preventDefault(); undoDrawing(); }
  if (e.key === "c") clearDrawing();
});
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && !stream && !preview.classList.contains("show")) startCamera();
});

// ---- go ----
shutter.disabled = true;
updateSizePreview();
setupVoiceRecognition();
loadModel();
startCamera();
</script>
</body>
</html>
